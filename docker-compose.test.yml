version: '3.8'

services:
  postgres-test:
    image: postgres:15
    environment:
      POSTGRES_DB: onesam_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test123
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./api/src/database/scripts:/docker-entrypoint-initdb.d
    networks:
      - onesam_test_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d onesam_test"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - onesam_test_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: redis-server --appendonly yes
    volumes:
      - redis_test_data:/data

  # Test API service with Bun runtime
  api-test:
    build:
      context: ./api
      dockerfile: Dockerfile.test
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test123@postgres-test:5432/onesam_test
      REDIS_URL: redis://redis-test:6379
    ports:
      - "3002:3000"
    networks:
      - onesam_test_network
    volumes:
      - ./api/src:/app/src:ro
      - ./api/tests:/app/tests:ro

volumes:
  postgres_test_data:
    driver: local
  redis_test_data:
    driver: local

networks:
  onesam_test_network:
    driver: bridge