services:
  # PostgreSQL database for development
  postgres:
    image: postgres:15
    container_name: onesam-postgres-dev
    environment:
      POSTGRES_DB: onesam_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./api/src/database/scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - onesam_dev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d onesam_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: onesam-redis-dev
    ports:
      - "6379:6379"
    networks:
      - onesam_dev_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_dev_data:/data
    restart: unless-stopped

  # MinIO for local file storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: onesam-minio-dev
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    command: server /data --console-address ":9001"
    networks:
      - onesam_dev_network
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # MinIO Client to create initial buckets
  minio-setup:
    image: minio/mc:latest
    container_name: onesam-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - onesam_dev_network
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minioadmin minioadmin123;
      mc mb minio/onesam-uploads --ignore-existing;
      mc mb minio/onesam-avatars --ignore-existing;
      mc mb minio/onesam-course-materials --ignore-existing;
      mc policy set public minio/onesam-avatars;
      mc policy set private minio/onesam-uploads;
      mc policy set private minio/onesam-course-materials;
      echo 'MinIO buckets created successfully';
      "
    restart: "no"

volumes:
  postgres_dev_data:
    driver: local
    name: onesam_postgres_dev
  redis_dev_data:
    driver: local
    name: onesam_redis_dev
  minio_dev_data:
    driver: local
    name: onesam_minio_dev

networks:
  onesam_dev_network:
    driver: bridge
    name: onesam_dev_network