services:
  db-test:
    image: postgres:16-alpine
    container_name: onesam-db-test
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: onesam_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test123
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d onesam_test"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes: {}
